<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snowark | WebGL Hero Prototype</title>
  <link href="https://fonts.googleapis.com/css2?family=Cambo&family=Lato:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }

    #hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(180deg, #0d2d2e 0%, #123a3b 40%, #0f3031 70%, #0d2d2e 100%);
    }

    #hero canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .fallback {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.12;
      pointer-events: none;
    }
    .fallback svg { width: 100%; height: 100%; max-width: 900px; }

    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2;
      pointer-events: none;
      padding: 24px;
    }
    .content > * { pointer-events: auto; }

    .badge {
      font-family: 'Lato', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #4cc296;
      border: 1px solid rgba(76,194,150,0.3);
      border-radius: 100px;
      padding: 6px 16px;
      margin-bottom: 18px;
    }

    h1 {
      font-family: 'Cambo', Georgia, serif;
      font-weight: 400;
      font-size: clamp(2rem, 5vw, 3.8rem);
      line-height: 1.08;
      color: #fff;
      text-align: center;
      margin-bottom: 18px;
    }

    .sub {
      font-family: 'Lato', sans-serif;
      font-size: 1.05rem;
      line-height: 1.6;
      color: rgba(233,231,227,0.78);
      text-align: center;
      max-width: 520px;
      margin-bottom: 28px;
    }

    .btn {
      font-family: 'Lato', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      padding: 13px 30px;
      border-radius: 8px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.18);
      transition: background 0.2s, border-color 0.2s;
    }
    .btn:hover { background: rgba(255,255,255,0.13); border-color: rgba(255,255,255,0.32); }

    .note {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      font-family: 'Lato', sans-serif;
      font-size: 0.7rem;
      color: rgba(233,231,227,0.35);
      pointer-events: none;
    }

    @media (prefers-reduced-motion) {
      #hero canvas { display: none; }
      .fallback { opacity: 0.25; }
    }
  </style>
</head>
<body>

<div id="hero">
  <!-- WebGL canvas inserted by JS -->
  <!-- Static SVG fallback -->
  <noscript>
    <div class="fallback">
      <svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
        <defs><radialGradient id="g" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#0d8f64" stop-opacity="0.4"/><stop offset="100%" stop-color="#0d8f64" stop-opacity="0"/></radialGradient></defs>
        <rect width="900" height="600" fill="url(#g)"/>
        <g stroke="white" stroke-width="1" opacity="0.12">
          <line x1="0" y1="150" x2="900" y2="150"/><line x1="0" y1="300" x2="900" y2="300"/><line x1="0" y1="450" x2="900" y2="450"/>
          <line x1="225" y1="0" x2="225" y2="600"/><line x1="450" y1="0" x2="450" y2="600"/><line x1="675" y1="0" x2="675" y2="600"/>
        </g>
        <g fill="white" opacity="0.3">
          <circle cx="225" cy="150" r="5"/><circle cx="450" cy="150" r="6"/><circle cx="675" cy="150" r="5"/>
          <circle cx="225" cy="300" r="6"/><circle cx="450" cy="300" r="7"/><circle cx="675" cy="300" r="6"/>
          <circle cx="225" cy="450" r="5"/><circle cx="450" cy="450" r="6"/><circle cx="675" cy="450" r="5"/>
        </g>
        <g fill="#0d8f64" opacity="0.45">
          <circle cx="450" cy="300" r="6"/><circle cx="225" cy="150" r="5"/><circle cx="675" cy="450" r="5"/>
        </g>
      </svg>
    </div>
  </noscript>
  <div class="fallback" id="fallback" aria-hidden="true">
    <svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
      <defs><radialGradient id="g2" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#0d8f64" stop-opacity="0.4"/><stop offset="100%" stop-color="#0d8f64" stop-opacity="0"/></radialGradient></defs>
      <rect width="900" height="600" fill="url(#g2)"/>
      <g stroke="white" stroke-width="1" opacity="0.12"><line x1="0" y1="150" x2="900" y2="150"/><line x1="0" y1="300" x2="900" y2="300"/><line x1="0" y1="450" x2="900" y2="450"/><line x1="225" y1="0" x2="225" y2="600"/><line x1="450" y1="0" x2="450" y2="600"/><line x1="675" y1="0" x2="675" y2="600"/></g>
      <g fill="white" opacity="0.3"><circle cx="225" cy="150" r="5"/><circle cx="450" cy="150" r="6"/><circle cx="675" cy="150" r="5"/><circle cx="225" cy="300" r="6"/><circle cx="450" cy="300" r="7"/><circle cx="675" cy="300" r="6"/><circle cx="225" cy="450" r="5"/><circle cx="450" cy="450" r="6"/><circle cx="675" cy="450" r="5"/></g>
      <g fill="#0d8f64" opacity="0.45"><circle cx="450" cy="300" r="6"/><circle cx="225" cy="150" r="5"/><circle cx="675" cy="450" r="5"/></g>
    </svg>
  </div>

  <div class="content">
    <div class="badge">WebGL Prototype</div>
    <h1>Your AI business partner,<br>deployed in days</h1>
    <p class="sub">A persistent, context-rich agent that connects to your tools, learns how you operate, and gets to work.</p>
    <a href="#" class="btn">Let's talk</a>
  </div>
  <div class="note">Move your cursor to explore</div>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

const hero = document.getElementById('hero');
const fallback = document.getElementById('fallback');

// Respect reduced motion
if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  document.querySelector('#hero canvas')?.remove();
  fallback.style.opacity = '0.25';
}

// ── Canvas ──
const canvas = document.createElement('canvas');
hero.insertBefore(canvas, hero.firstChild);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000000, 0);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 80);
camera.position.set(0, 0, 16);
camera.lookAt(0, 0, 0);

// ── Lights ──
scene.add(new THREE.AmbientLight(0x2a7f80, 0.5));
const key = new THREE.PointLight(0xffffff, 1.0, 30, 1);
key.position.set(6, 4, 10);
scene.add(key);
const accent = new THREE.PointLight(0x0d8f64, 1.4, 20, 1);
accent.position.set(-5, -3, 6);
scene.add(accent);

// ── Central globe: semi-transparent teal icosahedron ──
const coreGroup = new THREE.Group();
scene.add(coreGroup);

const icoGeo = new THREE.IcosahedronGeometry(2.0, 3);
const icoMat = new THREE.MeshPhysicalMaterial({
  color: 0x2a7f80,
  metalness: 0.05,
  roughness: 0.25,
  transparent: true,
  opacity: 0.7,
});
const ico = new THREE.Mesh(icoGeo, icoMat);
coreGroup.add(ico);

// Wireframe cage around it
const cageGeo = new THREE.IcosahedronGeometry(2.08, 3);
const cageMat = new THREE.MeshBasicMaterial({
  color: 0xffffff,
  wireframe: true,
  transparent: true,
  opacity: 0.10,
});
coreGroup.add(new THREE.Mesh(cageGeo, cageMat));

// Inner glow
const innerGeo = new THREE.SphereGeometry(0.9, 32, 32);
const innerMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uColor: { value: new THREE.Color('#4cc296') },
  },
  vertexShader: `
    varying vec3 vNormal;
    varying vec3 vPos;
    void main() {
      vNormal = normalize(normalMatrix * normal);
      vPos = position;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying vec3 vNormal;
    varying vec3 vPos;
    uniform float uTime;
    uniform vec3 uColor;
    void main() {
      float i = pow(0.6 - dot(vNormal, vec3(0,0,1)), 2.5);
      float p = 0.82 + 0.18 * sin(uTime * 0.0018 + vPos.y * 1.5);
      gl_FragColor = vec4(uColor, i * 0.5 * p);
    }
  `,
  transparent: true,
  depthWrite: false,
});
const innerGlow = new THREE.Mesh(innerGeo, innerMat);
coreGroup.add(innerGlow);

// ── Orbital rings ──
const innerRing = [];
const outerRing = [];
const allNodes = [];

function makeNode(color, size) {
  const g = new THREE.SphereGeometry(size, 16, 16);
  const m = new THREE.MeshStandardMaterial({
    color,
    roughness: 0.15,
    metalness: 0.1,
    emissive: color,
    emissiveIntensity: 0.25,
  });
  return new THREE.Mesh(g, m);
}

// Inner ring: 10 white nodes
for (let i = 0; i < 10; i++) {
  const angle = (Math.PI * 2 * i) / 10;
  const n = makeNode(0xffffff, 0.09);
  n.userData = { angle, radius: 3.8, baseY: 0, speed: 0.14 };
  innerRing.push(n);
  allNodes.push(n);
  scene.add(n);
}

// Outer ring: 14 teal-soft nodes
for (let i = 0; i < 14; i++) {
  const angle = (Math.PI * 2 * i) / 14 + Math.PI / 14;
  const n = makeNode(0x7fb8b9, 0.10);
  n.userData = { angle, radius: 6.0, baseY: 0, speed: 0.09 };
  outerRing.push(n);
  allNodes.push(n);
  scene.add(n);
}

// 3 green accent nodes on outer ring
const accentNodes = [];
for (const idx of [3, 7, 11]) {
  const angle = outerRing[idx].userData.angle;
  const n = makeNode(0x4cc296, 0.15);
  n.userData = { angle, radius: 6.0, baseY: 0, speed: 0.09 };
  accentNodes.push(n);
  allNodes.push(n);
  scene.add(n);
}

// ── Connection lines ──
const connections = [];
function makeLine() {
  const g = new THREE.BufferGeometry();
  const arr = new Float32Array(6);
  g.setAttribute('position', new THREE.BufferAttribute(arr, 3));
  const m = new THREE.LineBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 0.08,
    depthWrite: false,
  });
  const l = new THREE.Line(g, m);
  return { line: l, arr };
}

allNodes.forEach(() => {
  const c = makeLine();
  connections.push(c);
  scene.add(c.line);
});

// ── Particles ──
const particleGroup = new THREE.Group();
scene.add(particleGroup);
const pGeo = new THREE.SphereGeometry(0.035, 6, 6);
const pMat = new THREE.MeshBasicMaterial({ color: 0x4cc296, transparent: true, opacity: 0.85, depthWrite: false });
const particles = [];
const MAX_P = 35;

function spawn() {
  if (particles.length >= MAX_P) return;
  const target = allNodes[Math.floor(Math.random() * allNodes.length)];
  const mesh = new THREE.Mesh(pGeo, pMat.clone());
  mesh.userData = {
    prog: 0,
    speed: 0.004 + Math.random() * 0.008,
    target,
    fromCore: Math.random() > 0.4,
  };
  particleGroup.add(mesh);
  particles.push(mesh);
}

// ── Sizing ──
function size() {
  const w = hero.clientWidth;
  const h = hero.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / Math.max(h, 1);
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', size);
size();

// ── Mouse ──
let mx = 0, my = 0;
let tmx = 0, tmy = 0;
hero.addEventListener('mousemove', e => {
  const r = hero.getBoundingClientRect();
  tmx = ((e.clientX - r.left) / r.width - 0.5) * 2;
  tmy = -((e.clientY - r.top) / r.height - 0.5) * 2;
});
hero.addEventListener('mouseleave', () => { tmx = 0; tmy = 0; });

// ── Loop ──
const clock = new THREE.Clock();
let assembly = 0;
const startTime = performance.now();

function loop(t) {
  requestAnimationFrame(loop);
  const dt = Math.min(clock.getDelta(), 0.1);
  const elapsed = t - startTime;

  // Assembly
  assembly = Math.min(1, assembly + dt * 0.7);

  // Mouse smoothing
  mx += (tmx - mx) * 0.05;
  my += (tmy - my) * 0.05;

  // Core rotation
  coreGroup.rotation.y += dt * 0.2;
  coreGroup.rotation.x += dt * 0.08;
  coreGroup.rotation.z += dt * 0.05;

  // Inner glow uniform
  innerMat.uniforms.uTime.value = elapsed;

  // Position nodes
  allNodes.forEach(n => {
    const { angle, radius, speed } = n.userData;
    const a = angle + elapsed * 0.00025 * speed;
    const ax = Math.cos(a) * radius;
    const az = Math.sin(a) * radius;
    const ay = Math.sin(a * 2 + angle) * 0.5;

    // Scattered start positions
    const sa = angle * 3;
    const sx = Math.cos(sa) * radius * 3;
    const sy = (Math.sin(angle * 7) * 6);
    const sz = Math.sin(sa) * radius * 3;

    const p = ease(assembly);
    n.position.set(
      sx + (ax - sx) * p,
      sy + (ay - sy) * p,
      sz + (az - sz) * p,
    );
  });

  // Connection lines
  connections.forEach((c, i) => {
    if (i >= allNodes.length) return;
    const n = allNodes[i];
    c.arr[3] = n.position.x;
    c.arr[4] = n.position.y;
    c.arr[5] = n.position.z;
    c.line.geometry.attributes.position.needsUpdate = true;
  });

  // Spawn particles after assembly starts
  if (assembly > 0.4 && Math.random() < 0.18) spawn();

  // Animate particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.userData.prog += p.userData.speed;
    if (p.userData.prog >= 1) {
      particleGroup.remove(p);
      p.material.dispose();
      particles.splice(i, 1);
      continue;
    }
    const prog = p.userData.prog;
    const node = p.userData.target;
    const s = p.userData.fromCore ? new THREE.Vector3(0,0,0) : node.position.clone();
    const e = p.userData.fromCore ? node.position.clone() : new THREE.Vector3(0,0,0);
    p.position.lerpVectors(s, e, prog);
    p.material.opacity = prog < 0.1 ? prog * 10 : prog > 0.75 ? (1 - prog) * 4 : 0.85;
  }

  // Camera
  camera.position.x = mx * 3;
  camera.position.y = my * 2;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);

  // Hide fallback
  if (assembly > 0.15 && fallback.style.display !== 'none') {
    fallback.style.display = 'none';
  }
}

function ease(t) { return 1 - Math.pow(1 - t, 3); }

requestAnimationFrame(loop);
</script>

</body>
</html>
