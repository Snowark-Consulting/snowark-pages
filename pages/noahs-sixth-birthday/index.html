  <script>
  (function() {
    var TOTAL = 192;
    var canvas = document.getElementById('frameCanvas');
    var ctx = canvas.getContext('2d');
    var indicator = document.getElementById('scrollIndicator');
    var calendarCta = document.getElementById('calendarCta');
    var pin = document.getElementById('videoPin');
    var section = document.getElementById('videoSection');

    var frames = new Array(TOTAL);
    var loadedCount = 0;
    var currentFrame = 0;
    var ready = false;

    function pad(n) { return String(n).padStart(3, '0'); }

    function resize() {
      var dpr = window.devicePixelRatio || 1;
      var w = pin.clientWidth;
      var h = pin.clientHeight;

      // Desktop only: constrain canvas to 16:9 so full frame is visible
      if (w >= 768) {
        var maxH = w / 16 * 9;
        if (maxH < h) h = maxH;
        else { w = h * 16 / 9; }
      }
      // Mobile: untouched — canvas fills viewport, cover handles cropping

      canvas.width = w * dpr;
      canvas.height = h * dpr;
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(dpr, dpr);
    }

    function drawFrame(index) {
      var frame = frames[index];
      if (!frame) {
        for (var d = 1; d < TOTAL; d++) {
          if (index - d >= 0 && frames[index - d]) { frame = frames[index - d]; break; }
          if (index + d < TOTAL && frames[index + d]) { frame = frames[index + d]; break; }
        }
        if (!frame) return;
      }
      currentFrame = index;

      var dpr = window.devicePixelRatio || 1;
      var cw = canvas.width / dpr;
      var ch = canvas.height / dpr;
      var vw = frame.naturalWidth;
      var vh = frame.naturalHeight;
      if (!vw || !vh) return;

      var imgAspect = vw / vh;
      var canvasAspect = cw / ch;
      var sx, sy, sw, sh;

      if (imgAspect > canvasAspect) {
        sh = vh; sw = sh * canvasAspect;
        sx = (vw - sw) / 2; sy = 0;
      } else {
        sw = vw; sh = sw / canvasAspect;
        sx = 0; sy = (vh - sh) / 2;
      }

      ctx.clearRect(0, 0, cw, ch);
      ctx.drawImage(frame, sx, sy, sw, sh, 0, 0, cw, ch);
    }

    function preloadFrame(i) {
      var img = new Image();
      img.onload = function() {
        frames[i] = img;
        loadedCount++;

        if (loadedCount === 1) {
          resize();
        }
        if (i === 0) {
          drawFrame(0);
        }

        if (!ready && loadedCount >= Math.ceil(TOTAL / 4)) {
          ready = true;
        }
      };
      img.onerror = function() {
        loadedCount++; // count as "loaded" so we don't block forever
      };
      img.src = 'https://snowark-consulting.github.io/snowark-pages/frames/frame_' + pad(i) + '.webp';
    }

    // Size canvas
    resize();

    // Preload every 4th frame first
    for (var i = 0; i < TOTAL; i += 4) {
      preloadFrame(i);
    }

    // Then the rest
    setTimeout(function() {
      for (var i = 0; i < TOTAL; i++) {
        if (i % 4 !== 0) preloadFrame(i);
      }
    }, 50);

    // Scroll-driven frame selection (no GSAP dependency)
    window.addEventListener('scroll', function() {
      if (!ready) return;

      var rect = section.getBoundingClientRect();
      var sectionTop = rect.top;
      var sectionHeight = rect.height;
      var viewportHeight = window.innerHeight;
      var scrollable = sectionHeight - viewportHeight;
      var scrolled = -sectionTop;
      var progress = Math.max(0, Math.min(1, scrolled / scrollable));

      if (isNaN(progress)) return;

      var fi = Math.round(progress * (TOTAL - 1));
      drawFrame(fi);
      indicator.style.opacity = Math.max(0, 1 - progress / 0.10);

      // Calendar CTA: fade in after 80%, stay to the end
      if (progress > 0.80) {
        calendarCta.classList.add('visible');
      } else {
        calendarCta.classList.remove('visible');
      }
    });

    window.addEventListener('resize', function() {
      resize();
      drawFrame(currentFrame);
    });
  })();

  // ── Calendar .ics generator ──
  function addToCalendar() {
    var lines = [
      'BEGIN:VCALENDAR',
      'VERSION:2.0',
      'PRODID:-//Snowark//NoahsBirthday//EN',
      'CALSCALE:GREGORIAN',
      'METHOD:PUBLISH',
      'BEGIN:VEVENT',
      'DTSTART;TZID=Australia/Adelaide:20260905T100000',
      'DTEND;TZID=Australia/Adelaide:20260905T120000',
      'DTSTAMP:20260712T000000Z',
      'UID:noah-birthday-2026@snowark.com.au',
      'SUMMARY:Noah\'s 6th Birthday',
      'LOCATION:Mitcham Reserve',
      'DESCRIPTION:RSVP: https://snowark.com.au/pages/noahs-sixth-birthday#rsvp\n\nNoah\'s 6th Birthday Party\nMitcham Reserve\nSaturday 5 September 2026, 10:00 am – 12:00 pm\n\n🍰 Fruit and Cake Provided\n🎨 Face Painting',
      'END:VEVENT',
      'END:VCALENDAR'
    ];
    var ics = lines.join('\r\n');

    var blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
    var link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'Noahs-6th-Birthday.ics';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(link.href);
  }

  // ── RSVP modal + Supabase ──
  var SUPABASE_URL = 'https://fwnqlryktisglebhmfeb.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_BfWyBmPTdmr_WW92HI3Yew_1rvSkGpZ';

  function openRsvp() {
    document.getElementById('rsvpOverlay').classList.add('open');
  }

  function closeRsvp() {
    document.getElementById('rsvpOverlay').classList.remove('open');
  }

  function submitRsvp() {
    var name = document.getElementById('rsvpName').value.trim();
    if (!name) { alert("Arrr, we need a name for the ship's log!"); return; }

    var radio = document.querySelector('input[name="attending"]:checked');
    if (!radio) { alert("Will ye be sailin' or not, matey?"); return; }
    var status = radio.value === 'yes' ? 'rsvp_yes' : 'rsvp_no';

    fetch(SUPABASE_URL + '/rest/v1/client_responses', {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ client_name: name, status: status })
    }).then(function() {
      document.getElementById('rsvpForm').style.display = 'none';
      document.getElementById('rsvpSuccess').style.display = 'block';
    }).catch(function() {
      document.getElementById('rsvpForm').style.display = 'none';
      document.getElementById('rsvpSuccess').style.display = 'block';
    });
  }

  <script>
  // #rsvp deep link — auto-open RSVP modal
  if (window.location.hash === '#rsvp') {
    setTimeout(function() { openRsvp(); }, 600);
  }
  </script>

</div>
