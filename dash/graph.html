<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Graph — Snowark</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #080810;
    color: #e0e0e0;
    font-family: "Lato", -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }
  #graph { width: 100%; height: 100%; }

  #info {
    position: fixed; bottom: 24px; left: 24px;
    background: rgba(23, 68, 69, 0.92);
    border: 1px solid rgba(13, 143, 100, 0.3);
    border-radius: 10px; padding: 14px 18px;
    max-width: 360px; pointer-events: none;
    opacity: 0; transition: opacity 0.25s;
    backdrop-filter: blur(12px);
  }
  #info.visible { opacity: 1; }
  #info .name { font-family: "Cambo", Georgia, serif; font-size: 16px; color: #fff; margin-bottom: 4px; }
  #info .detail { font-size: 12px; color: #a0c4c4; line-height: 1.5; }

  #controls {
    position: fixed; top: 16px; right: 16px;
    display: flex; gap: 8px; z-index: 10;
  }
  #controls button {
    background: rgba(23, 68, 69, 0.85);
    border: 1px solid rgba(13, 143, 100, 0.25);
    color: #e0e0e0; padding: 8px 14px;
    border-radius: 8px; cursor: pointer;
    font-family: "Lato", sans-serif; font-size: 12px;
    transition: background 0.2s; backdrop-filter: blur(8px);
  }
  #controls button:hover { background: rgba(13, 143, 100, 0.3); }
  #controls button.active { background: #0d8f64; border-color: #0d8f64; }

  #loading {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: "Cambo", Georgia, serif;
    font-size: 18px; color: #0d8f64; z-index: 100;
  }

  #legend {
    position: fixed; top: 16px; left: 16px;
    background: rgba(23, 68, 69, 0.7);
    border: 1px solid rgba(13, 143, 100, 0.2);
    border-radius: 8px; padding: 10px 14px;
    font-size: 11px; backdrop-filter: blur(8px);
    z-index: 10; max-height: 50vh; overflow-y: auto;
  }
  #legend .item { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
  #legend .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  #legend .count { color: #7a9a9a; margin-left: auto; padding-left: 12px; }

  /* Content panel — slides in from right */
  #content-panel {
    position: fixed; top: 0; right: -520px;
    width: 500px; height: 100vh;
    background: rgba(10, 12, 20, 0.96);
    border-left: 1px solid rgba(13, 143, 100, 0.3);
    z-index: 50; transition: right 0.35s cubic-bezier(0.4,0,0.2,1);
    display: flex; flex-direction: column;
    backdrop-filter: blur(16px);
  }
  #content-panel.open { right: 0; }
  #panel-header {
    padding: 16px 20px; border-bottom: 1px solid rgba(13, 143, 100, 0.2);
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  #panel-header .title {
    font-family: "Cambo", Georgia, serif; font-size: 18px; color: #fff;
    margin-bottom: 2px;
  }
  #panel-header .path {
    font-size: 11px; color: #0d8f64; font-family: "JetBrains Mono", monospace;
  }
  #panel-close {
    background: none; border: 1px solid rgba(13, 143, 100, 0.3);
    color: #a0c4c4; font-size: 18px; cursor: pointer;
    width: 32px; height: 32px; border-radius: 6px;
    line-height: 1; transition: background 0.2s;
  }
  #panel-close:hover { background: rgba(13, 143, 100, 0.2); }
  #panel-body {
    flex: 1; overflow-y: auto; padding: 20px;
    font-size: 13px; line-height: 1.7; color: #c8d6d6;
  }
  #panel-body h1, #panel-body h2, #panel-body h3 {
    font-family: "Cambo", Georgia, serif; color: #fff;
    margin: 16px 0 8px;
  }
  #panel-body h1 { font-size: 20px; }
  #panel-body h2 { font-size: 16px; }
  #panel-body h3 { font-size: 14px; }
  #panel-body p { margin: 0 0 12px; }
  #panel-body a { color: #3ddc97; text-decoration: none; }
  #panel-body code {
    background: rgba(13, 143, 100, 0.15); padding: 2px 6px;
    border-radius: 3px; font-family: "JetBrains Mono", monospace; font-size: 12px;
  }
  #panel-body pre {
    background: rgba(0,0,0,0.3); padding: 12px 16px; border-radius: 8px;
    overflow-x: auto; margin: 8px 0;
  }
  #panel-body pre code { background: none; padding: 0; }
  #panel-body table {
    width: 100%; border-collapse: collapse; margin: 8px 0;
    font-size: 11px;
  }
  #panel-body th, #panel-body td {
    border: 1px solid rgba(13, 143, 100, 0.2);
    padding: 6px 10px; text-align: left;
  }
  #panel-body th { background: rgba(23, 68, 69, 0.5); color: #fff; }
  #panel-body hr { border: none; border-top: 1px solid rgba(13, 143, 100, 0.15); margin: 16px 0; }
  #panel-body blockquote {
    border-left: 3px solid #0d8f64; padding: 4px 12px;
    margin: 8px 0; color: #a0c4c4; font-style: italic;
  }
  #panel-body ul, #panel-body ol { padding-left: 20px; margin: 8px 0; }
  #panel-loading { padding: 40px; text-align: center; color: #0d8f64; }
</style>
</head>
<body>
<div id="graph"></div>
<div id="loading">Loading knowledge graph...</div>
<div id="info"><div class="name"></div><div class="detail"></div></div>
<div id="controls">
  <button id="btn-rotate" class="active" onclick="toggleRotate()">Rotate</button>
  <button id="btn-reset" onclick="resetCamera()">Reset</button>
</div>
<div id="legend"></div>
<div id="content-panel">
  <div id="panel-header">
    <div>
      <div class="title" id="panel-title">Select a node</div>
      <div class="path" id="panel-path"></div>
    </div>
    <button id="panel-close" onclick="closePanel()">×</button>
  </div>
  <div id="panel-body"><div id="panel-loading">Click a node to view its contents</div></div>
</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/3d-force-graph@1.73.5/dist/3d-force-graph.min.js"></script>
<script src="https://unpkg.com/marked@12.0.0/marked.min.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const client = params.get("client") || "atlas";

const TEAL = "#174445";
const GREEN = "#0d8f64";
const DARK_BG = "#080810";

const COMMUNITY_COLORS = [
  "#0d8f64", "#3ddc97", "#7be0c8", "#60a5fa", "#a78bfa",
  "#f472b6", "#f5b14c", "#ef5a5a", "#38bdf8", "#a3e635",
  "#fb923c", "#e879f9", "#4ade80", "#fbbf24", "#818cf8",
  "#f87171", "#34d399", "#c084fc"
];

let rotating = true;
let Graph;
let contentMap = {}; // node id -> content_hash for lazy loading
let nodeFileMap = {}; // node id -> source_file path

fetch(`data/${client}-graph.json`)
  .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
  .then(raw => {
    document.getElementById("loading").style.display = "none";

    const commMap = new Map();
    const nodes = (raw.nodes || []).map(n => {
      const cid = n.community ?? 0;
      const cname = n.community_name || `Community ${cid}`;
      if (!commMap.has(cid)) commMap.set(cid, { name: cname, count: 0, color: COMMUNITY_COLORS[cid % COMMUNITY_COLORS.length] });
      commMap.get(cid).count++;

      if (n.content_hash) contentMap[n.id] = n.content_hash;
      if (n.source_file) nodeFileMap[n.id] = n.source_file;

      return {
        id: n.id, name: n.label || n.id,
        val: 4 + (n.file_type === "doc" ? 3 : 1),
        color: COMMUNITY_COLORS[cid % COMMUNITY_COLORS.length],
        desc: n.community_name || "",
        type: n.file_type || "unknown",
        file: n.source_file || "",
        community: cid,
        hasContent: !!n.content_hash
      };
    });

    const links = (raw.links || []).map(l => ({
      source: l.source, target: l.target,
      relation: l.relation || "", weight: l.weight || 1
    }));

    const legend = document.getElementById("legend");
    const sortedComms = [...commMap.entries()].sort((a,b) => b[1].count - a[1].count).slice(0, 14);
    legend.innerHTML = sortedComms.map(([cid, c]) =>
      `<div class="item"><span class="dot" style="background:${c.color}"></span>${c.name}<span class="count">${c.count}</span></div>`
    ).join("");

    const elem = document.getElementById("graph");
    Graph = ForceGraph3D()(elem)
      .graphData({ nodes, links })
      .nodeColor(n => n.color)
      .nodeVal(n => n.hasContent ? n.val * 1.3 : n.val)
      .nodeLabel(n => `<b>${n.name}</b><br><small>${n.desc}<br>${n.type} · ${n.file}</small>`)
      .nodeResolution(32)
      .linkColor(() => `rgba(13, 143, 100, 0.45)`)
      .linkWidth(l => Math.max(1, l.weight * 2.5))
      .linkDirectionalParticles(2)
      .linkDirectionalParticleWidth(1.2)
      .linkCurvature(0.15)
      .linkOpacity(0.55)
      .backgroundColor(DARK_BG)
      .onNodeHover(node => {
        const info = document.getElementById("info");
        if (node) {
          info.querySelector(".name").textContent = node.name;
          info.querySelector(".detail").innerHTML = `${node.desc}<br>${node.type} · ${node.file}`;
          info.classList.add("visible");
          Graph.linkWidth(l => {
            const sid = typeof l.source === 'object' ? l.source.id : l.source;
            const tid = typeof l.target === 'object' ? l.target.id : l.target;
            return (sid === node.id || tid === node.id) ? 3 : 0.3;
          });
          Graph.linkColor(l => {
            const sid = typeof l.source === 'object' ? l.source.id : l.source;
            const tid = typeof l.target === 'object' ? l.target.id : l.target;
            return (sid === node.id || tid === node.id) ? 'rgba(13, 143, 100, 0.9)' : 'rgba(13, 143, 100, 0.08)';
          });
        } else {
          info.classList.remove("visible");
          Graph.linkWidth(l => Math.max(1, l.weight * 2.5));
          Graph.linkColor(() => 'rgba(13, 143, 100, 0.45)');
        }
      })
      .onNodeClick(node => {
        const dist = 40;
        const pos = { x: node.x, y: node.y, z: node.z };
        Graph.cameraPosition(
          { x: pos.x + dist * 1.2, y: pos.y + dist * 0.4, z: pos.z + dist * 1.2 },
          pos, 1200
        );
        openContentPanel(node);
      });

    Graph.d3Force("charge").strength(-60);
    Graph.d3Force("link").distance(l => 25 + l.weight * 15);

    animateRotation();
    addStarfield(Graph.scene());
  })
  .catch(err => {
    document.getElementById("loading").innerHTML =
      `<span style="color:#ef5a5a">Failed to load graph data.</span><br><small>${err.message}</small>`;
  });

function openContentPanel(node) {
  const panel = document.getElementById("content-panel");
  const title = document.getElementById("panel-title");
  const pathEl = document.getElementById("panel-path");
  const body = document.getElementById("panel-body");

  title.textContent = node.name;
  pathEl.textContent = node.file || "";

  const hash = contentMap[node.id];
  if (hash) {
    body.innerHTML = '<div id="panel-loading">Loading...</div>';
    const url = `data/${client}-content/${hash}.md`;
    fetch(url)
      .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(md => { body.innerHTML = marked.parse(md); })
      .catch(() => { body.innerHTML = '<p style="color:#ef5a5a">Failed to load file content.</p>'; });
  } else if (node.file) {
    body.innerHTML = '<p style="color:#7a9a9a">No content available for this node. Try a node with a <span style="color:#0d8f64">●</span> larger sphere.</p>';
  } else {
    body.innerHTML = '<p style="color:#7a9a9a">This node represents a concept, not a file.</p>';
  }

  panel.classList.add("open");
}

function closePanel() {
  document.getElementById("content-panel").classList.remove("open");
}

function toggleRotate() {
  rotating = !rotating;
  const btn = document.getElementById("btn-rotate");
  btn.textContent = rotating ? "Rotate" : "Paused";
  btn.classList.toggle("active", rotating);
}

function resetCamera() {
  if (Graph) Graph.zoomToFit(800, 100);
}

function animateRotation() {
  if (!Graph) return requestAnimationFrame(animateRotation);
  if (rotating) {
    const cam = Graph.camera();
    cam.position.applyAxisAngle(new THREE.Vector3(0, 1, 0), 0.0008);
    cam.lookAt(Graph.cameraPosition().lookAt || { x: 0, y: 0, z: 0 });
  }
  requestAnimationFrame(animateRotation);
}

function addStarfield(scene) {
  const geom = new THREE.BufferGeometry();
  const N = 1000;
  const positions = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    const r = 600 + Math.random() * 500;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
    positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i * 3 + 2] = r * Math.cos(phi);
  }
  geom.setAttribute("position", new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({
    color: 0xa9b4c2, size: 0.8, transparent: true,
    opacity: 0.4, sizeAttenuation: true, depthWrite: false
  });
  scene.add(new THREE.Points(geom, mat));
  scene.add(new THREE.AmbientLight(0xffffff, 0.4));
  const key = new THREE.PointLight(0x0d8f64, 1.0, 800);
  key.position.set(100, 150, 200);
  scene.add(key);
}
</script>
</body>
</html>
