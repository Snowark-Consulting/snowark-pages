187|<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
188|<script src="https://unpkg.com/3d-force-graph@1.73.5/dist/3d-force-graph.min.js"></script>

191|<script>
192|const params = new URLSearchParams(window.location.search);
193|const client = params.get("client") || "atlas";
194|
195|// Agent display names per client slug
196|const AGENT_NAMES = { atlas: "Atlas" };
197|const agentName = AGENT_NAMES[client] || client.charAt(0).toUpperCase() + client.slice(1);
198|document.querySelector(".loading-tag").textContent = `Loading ${agentName} Knowledge Graph`;
199|
200|const TEAL = "#174445";
201|const GREEN = "#0d8f64";
202|const DARK_BG = "#080810";
203|
204|const COMMUNITY_COLORS = [
205|  "#0d8f64", "#3ddc97", "#7be0c8", "#60a5fa", "#a78bfa",
206|  "#f472b6", "#f5b14c", "#ef5a5a", "#38bdf8", "#a3e635",
207|  "#fb923c", "#e879f9", "#4ade80", "#fbbf24", "#818cf8",
208|  "#f87171", "#34d399", "#c084fc"
209|];
210|
211|let rotating = true;
212|let Graph;
213|let contentMap = {}; // node id -> content_hash for lazy loading
214|let nodeFileMap = {}; // node id -> source_file path
215|
216|fetch(`data/${client}-graph.json`)
217|  .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
218|  .then(raw => {
219|    // Build graph data first, then ensure loading screen shows at least 8s
220|    const startTime = Date.now();
221|    
222|    // Process data in background, then show after 8s minimum
223|    function buildGraph() {
224|
225|    const commMap = new Map();
226|    const nodes = (raw.nodes || []).map(n => {
227|      const cid = n.community ?? 0;
228|      const cname = n.community_name || `Community ${cid}`;
229|      if (!commMap.has(cid)) commMap.set(cid, { name: cname, count: 0, color: COMMUNITY_COLORS[cid % COMMUNITY_COLORS.length] });
230|      commMap.get(cid).count++;
231|
232|      if (n.content_hash) contentMap[n.id] = n.content_hash;
233|      if (n.source_file) nodeFileMap[n.id] = n.source_file;
234|
235|      return {
236|        id: n.id, name: n.label || n.id,
237|        val: 4 + (n.file_type === "doc" ? 3 : 1),
238|        color: COMMUNITY_COLORS[cid % COMMUNITY_COLORS.length],
239|        desc: n.community_name || "",
240|        type: n.file_type || "unknown",
241|        file: n.source_file || "",
242|        community: cid,
243|        hasContent: !!n.content_hash
244|      };
245|    });
246|
247|    const links = (raw.links || []).map(l => ({
248|      source: l.source, target: l.target,
249|      relation: l.relation || "", weight: l.weight || 1
250|    }));
251|
252|    const legend = document.getElementById("legend");
253|    const sortedComms = [...commMap.entries()].sort((a,b) => b[1].count - a[1].count).slice(0, 14);
254|    legend.innerHTML = sortedComms.map(([cid, c]) =>
255|      `<div class="item"><span class="dot" style="background:${c.color}"></span>${c.name}<span class="count">${c.count}</span></div>`
256|    ).join("");
257|
258|    const elem = document.getElementById("graph");
259|    Graph = ForceGraph3D()(elem)
260|      .graphData({ nodes, links })
261|      .nodeColor(n => n.color)
262|      .nodeVal(n => n.hasContent ? n.val * 1.3 : n.val)
263|      .nodeLabel(n => `<b>${n.name}</b><br><small>${n.desc}<br>${n.type} · ${n.file}</small>`)
264|      .nodeResolution(32)
265|      .linkColor(() => `rgba(13, 143, 100, 0.45)`)
266|      .linkWidth(l => Math.max(1, l.weight * 2.5))
267|      .linkDirectionalParticles(2)
268|      .linkDirectionalParticleWidth(1.2)
269|      .linkCurvature(0.15)
270|      .linkOpacity(0.55)
271|      .backgroundColor(DARK_BG)
272|      .onNodeHover(node => {
273|        const info = document.getElementById("info");
274|        if (node) {
275|          info.querySelector(".name").textContent = node.name;
276|          info.querySelector(".detail").innerHTML = `${node.desc}<br>${node.type} · ${node.file}`;
277|          info.classList.add("visible");
278|          Graph.linkWidth(l => {
279|            const sid = typeof l.source === 'object' ? l.source.id : l.source;
280|            const tid = typeof l.target === 'object' ? l.target.id : l.target;
281|            return (sid === node.id || tid === node.id) ? 3 : 0.3;
282|          });
283|          Graph.linkColor(l => {
284|            const sid = typeof l.source === 'object' ? l.source.id : l.source;
285|            const tid = typeof l.target === 'object' ? l.target.id : l.target;
286|            return (sid === node.id || tid === node.id) ? 'rgba(13, 143, 100, 0.9)' : 'rgba(13, 143, 100, 0.08)';
287|          });
288|        } else {
289|          info.classList.remove("visible");
290|          Graph.linkWidth(l => Math.max(1, l.weight * 2.5));
291|          Graph.linkColor(() => 'rgba(13, 143, 100, 0.45)');
292|        }
293|      })
294|      .onNodeClick(node => {
295|        const dist = 40;
296|        const pos = { x: node.x, y: node.y, z: node.z };
297|        Graph.cameraPosition(
298|          { x: pos.x + dist * 1.2, y: pos.y + dist * 0.4, z: pos.z + dist * 1.2 },
299|          pos, 1200
300|        );
301|        openContentPanel(node);
302|      });
303|
304|    Graph.d3Force("charge").strength(-60);
305|    Graph.d3Force("link").distance(l => 25 + l.weight * 15);
306|    animateRotation();
307|    addStarfield(Graph.scene());
308|    
309|    } // end buildGraph
310|
311|    // Ensure loading screen shows at least 8 seconds
312|    const elapsed = Date.now() - startTime;
313|    const remaining = Math.max(0, 8000 - elapsed);
314|    setTimeout(() => {
315|      buildGraph();
316|      document.getElementById("loading-overlay").classList.add("hidden");
317|    }, remaining);
318|  })
319|  .catch(err => {
320|    const ol = document.getElementById("loading-overlay");
321|    ol.querySelector(".loading-tag").textContent = `Failed to load ${agentName}`;
322|    ol.querySelector(".loading-tag").style.color = "#ef5a5a";
323|    ol.querySelector("img").style.animation = "none";
324|  });
325|
326|function openContentPanel(node) {
327|  const panel = document.getElementById("content-panel");
328|  const title = document.getElementById("panel-title");
329|  const pathEl = document.getElementById("panel-path");
330|  const body = document.getElementById("panel-body");
331|
332|  title.textContent = node.name;
333|  pathEl.textContent = node.file || "";
334|
335|  const hash = contentMap[node.id];
336|  if (hash) {
337|    body.innerHTML = '<div id="panel-loading">Loading...</div>';
338|    const url = `data/${client}-content/${hash}.md`;
339|    fetch(url)
340|      .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
341|      .then(md => { body.innerHTML = marked.parse(md); })
342|      .catch(() => { body.innerHTML = '<p style="color:#ef5a5a">Failed to load file content.</p>'; });
343|  } else if (node.file) {
344|    body.innerHTML = '<p style="color:#7a9a9a">No content available for this node. Try a node with a <span style="color:#0d8f64">●</span> larger sphere.</p>';
345|  } else {
346|    body.innerHTML = '<p style="color:#7a9a9a">This node represents a concept, not a file.</p>';
347|  }
348|
349|  panel.classList.add("open");
350|}
351|
352|function closePanel() {
353|  document.getElementById("content-panel").classList.remove("open");
354|}

356|function toggleRotate() {
357|  rotating = !rotating;
358|  const btn = document.getElementById("btn-rotate");
359|  btn.textContent = rotating ? "Rotate" : "Paused";
360|  btn.classList.toggle("active", rotating);
361|}
362|
363|function resetCamera() {
364|  if (Graph) Graph.zoomToFit(800, 100);
365|}
366|
367|function animateRotation() {
368|  if (!Graph) return requestAnimationFrame(animateRotation);
369|  if (rotating) {
370|    const cam = Graph.camera();
371|    cam.position.applyAxisAngle(new THREE.Vector3(0, 1, 0), 0.0008);
372|    cam.lookAt(Graph.cameraPosition().lookAt || { x: 0, y: 0, z: 0 });
373|  }
374|  requestAnimationFrame(animateRotation);
375|}
376|
377|function addStarfield(scene) {
378|  const geom = new THREE.BufferGeometry();
379|  const N = 1000;
380|  const positions = new Float32Array(N * 3);
381|  for (let i = 0; i < N; i++) {
382|    const r = 600 + Math.random() * 500;
383|    const theta = Math.random() * Math.PI * 2;
384|    const phi = Math.acos(2 * Math.random() - 1);
385|    positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
386|    positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
387|    positions[i * 3 + 2] = r * Math.cos(phi);
388|  }
389|  geom.setAttribute("position", new THREE.BufferAttribute(positions, 3));
390|  const mat = new THREE.PointsMaterial({
391|    color: 0xa9b4c2, size: 0.8, transparent: true,
392|    opacity: 0.4, sizeAttenuation: true, depthWrite: false
393|  });
394|  scene.add(new THREE.Points(geom, mat));
395|  scene.add(new THREE.AmbientLight(0xffffff, 0.4));
396|  const key = new THREE.PointLight(0x0d8f64, 1.0, 800);
397|  key.position.set(100, 150, 200);
398|  scene.add(key);
399|}
400|</script>
