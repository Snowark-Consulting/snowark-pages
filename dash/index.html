<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snowark — Agent Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cambo&family=Lato:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #174445;
    --teal-rgb: 23, 68, 69;
    --green: #0d8f64;
    --green-rgb: 13, 143, 100;
    --warm: #e9e7e3;
    --white: #FFFFFF;
    --black: #000000;
    --font-heading: 'Cambo', Georgia, 'Times New Roman', serif;
    --font-body: 'Lato', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    background: var(--warm);
    color: var(--black);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  .header {
    background: var(--teal);
    padding: 28px 24px 24px;
    text-align: center;
  }
  .header-logo {
    font-family: var(--font-heading);
    font-size: 1.6rem;
    color: var(--white);
    letter-spacing: 0.02em;
  }
  .header-client {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.7);
    margin-top: 4px;
  }
  .header-updated {
    display: inline-flex;
    align-items: center;
    gap: 16px;
    margin-top: 12px;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.5);
  }
  .header-graph-link {
    color: var(--green);
    text-decoration: none;
    font-weight: 700;
    padding: 4px 10px;
    border: 1px solid rgba(13, 143, 100, 0.3);
    border-radius: 6px;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .header-graph-link:hover { background: rgba(13, 143, 100, 0.15); }
  .pulse {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
  }
  .pulse.stale { background: #c4a42a; }
  .pulse.offline { background: #c44a4a; }

  /* Container */
  .container {
    max-width: 780px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }

  /* Panel cards */
  .panel {
    background: var(--white);
    border-radius: 12px;
    margin-bottom: 20px;
    overflow: hidden;
    border: 1px solid rgba(0,0,0,0.06);
  }
  .panel-header {
    padding: 20px 24px 0;
    font-family: var(--font-heading);
    font-size: 1.3rem;
    color: var(--teal);
  }
  .panel-body {
    padding: 16px 24px 24px;
  }

  /* Onboarding stages */
  .stages { display: flex; flex-direction: column; gap: 0; }
  .stage {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid rgba(0,0,0,0.05);
  }
  .stage:last-child { border-bottom: none; }
  .stage-icon {
    width: 32px; height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    font-weight: 700;
  }
  .stage.complete .stage-icon { background: var(--green); color: #fff; }
  .stage.in_progress .stage-icon { background: rgba(var(--green-rgb), 0.15); color: var(--green); border: 2px solid var(--green); }
  .stage.pending .stage-icon { background: rgba(0,0,0,0.05); color: rgba(0,0,0,0.3); }
  .stage-info { flex: 1; min-width: 0; }
  .stage-name { font-weight: 700; font-size: 0.95rem; }
  .stage-detail { font-size: 0.82rem; color: rgba(0,0,0,0.55); margin-top: 2px; }
  .stage-badge {
    font-size: 0.72rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
    align-self: center;
  }
  .stage.complete .stage-badge { background: rgba(var(--green-rgb), 0.1); color: var(--green); }
  .stage.in_progress .stage-badge { background: rgba(var(--green-rgb), 0.08); color: var(--green); }
  .stage.pending .stage-badge { background: rgba(0,0,0,0.04); color: rgba(0,0,0,0.4); }

  /* Progress bar */
  .progress-bar-wrap {
    padding: 16px 24px;
    background: rgba(var(--teal-rgb), 0.03);
    border-bottom: 1px solid rgba(0,0,0,0.05);
  }
  .progress-label {
    font-size: 0.8rem;
    color: rgba(0,0,0,0.5);
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }
  .progress-track {
    height: 6px;
    background: rgba(0,0,0,0.06);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 3px;
    transition: width 0.5s ease;
  }

  /* Activity feed */
  .activity-item {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(0,0,0,0.04);
    font-size: 0.9rem;
  }
  .activity-item:last-child { border-bottom: none; }
  .activity-date {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: rgba(0,0,0,0.4);
    white-space: nowrap;
    min-width: 70px;
    padding-top: 2px;
  }
  .activity-desc { flex: 1; }
  .activity-cat {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--teal);
    background: rgba(var(--teal-rgb), 0.07);
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
  }

  /* Counter row */
  .counter-row {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
  }
  .counter-card {
    flex: 1;
    background: rgba(var(--teal-rgb), 0.04);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }
  .counter-num {
    font-family: var(--font-heading);
    font-size: 2rem;
    color: var(--teal);
    line-height: 1;
  }
  .counter-label {
    font-size: 0.78rem;
    color: rgba(0,0,0,0.5);
    margin-top: 4px;
  }

  /* Health */
  .health-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .health-card {
    flex: 1;
    min-width: 140px;
    background: rgba(var(--teal-rgb), 0.04);
    border-radius: 10px;
    padding: 14px;
  }
  .health-label {
    font-size: 0.75rem;
    color: rgba(0,0,0,0.5);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
  }
  .health-value {
    font-weight: 700;
    font-size: 0.9rem;
  }
  .dot-ok { color: var(--green); }
  .dot-warn { color: #c4a42a; }
  .dot-off { color: #c44a4a; }

  /* Footer */
  .footer {
    text-align: center;
    padding: 32px 24px;
    font-size: 0.78rem;
    color: rgba(0,0,0,0.35);
  }
  .footer a { color: rgba(0,0,0,0.5); }

  /* Loading / error states */
  .loading { text-align: center; padding: 40px; color: rgba(0,0,0,0.4); }
  .error-state { text-align: center; padding: 40px; color: #c44a4a; }

  /* Capabilities */
  .capability-row {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
  }
  .skill-stat-card {
    flex: 1;
    background: linear-gradient(135deg, rgba(var(--teal-rgb), 0.06), rgba(var(--green-rgb), 0.06));
    border-radius: 10px;
    padding: 18px 16px;
    text-align: center;
    border: 1px solid rgba(var(--green-rgb), 0.12);
  }
  .skill-stat-num {
    font-family: var(--font-heading);
    font-size: 2.2rem;
    color: var(--teal);
    line-height: 1;
  }
  .skill-stat-num .accent { color: var(--green); }
  .skill-stat-label {
    font-size: 0.78rem;
    color: rgba(0,0,0,0.5);
    margin-top: 4px;
  }
  .tip-box {
    background: linear-gradient(135deg, rgba(var(--teal-rgb), 0.92), rgba(var(--teal-rgb), 0.85));
    border-radius: 10px;
    padding: 18px 20px;
    position: relative;
    min-height: 80px;
    display: flex;
    align-items: center;
    overflow: hidden;
  }
  .tip-box::before {
    content: '💡';
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1.4rem;
    opacity: 0.5;
  }
  .tip-content {
    padding-left: 40px;
    width: 100%;
  }
  .tip-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: rgba(255,255,255,0.5);
    margin-bottom: 4px;
  }
  .tip-text {
    font-family: var(--font-body);
    font-size: 0.95rem;
    color: rgba(255,255,255,0.92);
    line-height: 1.5;
  }
  .tip-text em {
    font-style: normal;
    color: #5ce0b8;
    font-weight: 700;
  }
  .tip-dots {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-top: 10px;
  }
  .tip-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: background 0.4s ease;
  }
  .tip-dot.active { background: rgba(255,255,255,0.8); }

  @media (max-width: 600px) {
    .container { padding: 16px 12px 40px; }
    .panel-header { padding: 16px 16px 0; }
    .panel-body { padding: 12px 16px 20px; }
    .counter-row { flex-direction: column; gap: 10px; }
    .health-row { flex-direction: column; }
    .stage-badge { font-size: 0.68rem; padding: 2px 8px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">Snowark</div>
  <div class="header-client" id="header-client">Loading…</div>
  <div class="header-updated">
    <a href="graph.html" id="graph-link" class="header-graph-link">Knowledge Graph</a>
    <span class="pulse" id="pulse-dot"></span>
    <span id="header-time"></span>
  </div>
</div>

<div class="container">

  <!-- Onboarding Progress -->
  <div class="panel">
    <div class="panel-header">Onboarding Progress</div>
    <div class="progress-bar-wrap">
      <div class="progress-label">
        <span id="progress-text">Loading…</span>
        <span id="progress-pct"></span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>
    <div class="panel-body stages" id="stages"></div>
  </div>

  <!-- Activity -->
  <div class="panel">
    <div class="panel-header">What Your Agent Is Doing</div>
    <div class="panel-body">
      <div class="counter-row" id="counters"></div>
      <div id="activity-feed"></div>
    </div>
  </div>

  <!-- Capabilities -->
  <div class="panel">
    <div class="panel-header">What Atlas Can Do For You</div>
    <div class="panel-body">
      <div class="capability-row" id="skill-stats"></div>
      <div class="tip-box" id="tip-box">
        <div class="tip-content">
          <div class="tip-label">Try asking Atlas</div>
          <div class="tip-text" id="tip-text"></div>
          <div class="tip-dots" id="tip-dots"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- System Health -->
  <div class="panel">
    <div class="panel-header">System Health</div>
    <div class="panel-body">
      <div class="health-row" id="health-cards"></div>
      <div style="margin-top:16px;font-size:0.82rem;color:rgba(0,0,0,0.45);" id="cron-list"></div>
    </div>
  </div>

</div>

<div class="footer">
  Powered by <a href="https://snowark.ai">Snowark Consulting</a>
  &middot; Data refreshes automatically
</div>

<script>
(async function() {
  const params = new URLSearchParams(window.location.search);
  const client = params.get('client') || 'atlas';
  const DATA_URL = `data/${client}.json`;
  document.getElementById('graph-link').href = `graph.html?client=${client}`;

  function timeAgo(iso) {
    const diff = (Date.now() - new Date(iso).getTime()) / 1000;
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff/60) + 'm ago';
    if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
    return Math.floor(diff/86400) + 'd ago';
  }

  function statusIcon(status) {
    if (status === 'ok' || status === 'complete') return '<span class="dot-ok">●</span>';
    if (status === 'in_progress' || status === 'pending_first') return '<span class="dot-warn">●</span>';
    return '<span class="dot-off">●</span>';
  }

  async function load() {
    try {
      const resp = await fetch(DATA_URL + '?t=' + Date.now());
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const d = await resp.json();

      // Header
      document.getElementById('header-client').textContent =
        d.client.agent + ' · ' + d.client.business;
      document.getElementById('header-time').textContent =
        'Updated ' + timeAgo(d.last_updated);

      const age = (Date.now() - new Date(d.last_updated).getTime()) / 1000;
      const dot = document.getElementById('pulse-dot');
      if (age > 3600) { dot.className = 'pulse offline'; }
      else if (age > 300) { dot.className = 'pulse stale'; }
      else { dot.className = 'pulse'; }

      // Onboarding progress
      const stages = d.onboarding.stages;
      const complete = stages.filter(s => s.status === 'complete').length;
      const total = stages.length;
      const pct = Math.round((complete / total) * 100);
      document.getElementById('progress-text').textContent =
        complete + ' of ' + total + ' stages complete';
      document.getElementById('progress-pct').textContent = pct + '%';
      document.getElementById('progress-fill').style.width = pct + '%';

      const stageHTML = stages.map(s =>
        '<div class="stage ' + s.status + '">' +
        '<div class="stage-icon">' + (s.status === 'complete' ? '✓' : s.status === 'in_progress' ? '→' : '·') + '</div>' +
        '<div class="stage-info"><div class="stage-name">' + s.name + '</div>' +
        '<div class="stage-detail">' + s.detail + '</div></div>' +
        '<div class="stage-badge">' + (s.status === 'complete' ? 'Done' : s.status === 'in_progress' ? 'In progress' : 'To do') + '</div>' +
        '</div>'
      ).join('');
      document.getElementById('stages').innerHTML = stageHTML;

      // Counters
      const a = d.activity;
      document.getElementById('counters').innerHTML =
        '<div class="counter-card"><div class="counter-num">' + a.tasks_completed + '</div><div class="counter-label">Tasks completed</div></div>' +
        '<div class="counter-card"><div class="counter-num">~' + a.hours_saved_estimate + 'h</div><div class="counter-label">Estimated time saved</div></div>';

      // Activity feed
      const feedHTML = a.recent.map(item =>
        '<div class="activity-item">' +
        '<div class="activity-date">' + item.date + '</div>' +
        '<div class="activity-desc">' + item.task + '</div>' +
        '<div class="activity-cat">' + item.category + '</div>' +
        '</div>'
      ).join('');
      document.getElementById('activity-feed').innerHTML = feedHTML;

      // Capabilities
      const cap = d.capabilities;
      document.getElementById('skill-stats').innerHTML =
        '<div class="skill-stat-card"><div class="skill-stat-num">' + cap.skills_count + '</div><div class="skill-stat-label">Skills loaded</div></div>' +
        '<div class="skill-stat-card"><div class="skill-stat-num"><span class="accent">' + cap.categories_count + '</span></div><div class="skill-stat-label">Capability areas</div></div>' +
        '<div class="skill-stat-card"><div class="skill-stat-num">' + cap.tips.length + '</div><div class="skill-stat-label">Things to try</div></div>';

      // Rotating tips
      let tipIndex = 0;
      const tips = cap.tips;
      const tipText = document.getElementById('tip-text');
      const tipDots = document.getElementById('tip-dots');

      // Build dots
      tipDots.innerHTML = tips.map((_, i) =>
        '<div class="tip-dot' + (i === 0 ? ' active' : '') + '"></div>'
      ).join('');

      function showTip(i) {
        tipText.innerHTML = tips[i];
        tipDots.querySelectorAll('.tip-dot').forEach((d, j) => {
          d.className = 'tip-dot' + (j === i ? ' active' : '');
        });
      }
      showTip(0);

      setInterval(() => {
        tipIndex = (tipIndex + 1) % tips.length;
        showTip(tipIndex);
      }, 5000);

      // Health cards
      const h = d.health;
      const hc = document.getElementById('health-cards');
      hc.innerHTML =
        '<div class="health-card">' +
        '<div class="health-label">Agent status</div>' +
        '<div class="health-value">' + statusIcon('ok') + ' ' + h.agent.status + '</div>' +
        '</div>' +
        '<div class="health-card">' +
        '<div class="health-label">Uptime</div>' +
        '<div class="health-value">' + h.agent.uptime_hours + 'h</div>' +
        '</div>' +
        '<div class="health-card">' +
        '<div class="health-label">Last backup</div>' +
        '<div class="health-value">' + timeAgo(h.backup.last) + '</div>' +
        '</div>' +
        '<div class="health-card">' +
        '<div class="health-label">Model</div>' +
        '<div class="health-value" style="font-size:0.8rem;">' + h.model + '</div>' +
        '</div>';

      // Cron list
      const cronHTML = h.crons.map(c =>
        '<div style="display:flex;gap:8px;align-items:center;padding:3px 0;">' +
        statusIcon(c.status) + ' ' + c.name + ' — next: ' + c.next +
        '</div>'
      ).join('');
      document.getElementById('cron-list').innerHTML = cronHTML;

    } catch(e) {
      document.body.innerHTML = '<div style="text-align:center;padding:80px 20px;font-family:sans-serif;"><h2 style="color:#174445;">Snowark</h2><p style="color:rgba(0,0,0,0.5);margin-top:12px;">Dashboard loading — data will appear shortly.</p><p style="color:rgba(0,0,0,0.35);font-size:0.85rem;">' + e.message + '</p></div>';
    }
  }

  await load();
  setInterval(load, 30000);
})();
</script>

</body>
</html>
