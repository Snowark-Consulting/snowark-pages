<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll-Controlled Video | Snowark</title>
  <link href="https://fonts.googleapis.com/css2?family=Cambo&family=Lato:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <style>
    :root {
      --teal: #174445;
      --green: #0d8f64;
      --warm: #e9e7e3;
      --white: #FFFFFF;
      --ink: #0b2021;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: auto; }

    body {
      font-family: 'Lato', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: #000;
      background: var(--white);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Canvas section ────────────── */
    .canvas-section {
      position: relative;
      height: 400vh;
      background: var(--ink);
    }

    .canvas-pin {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .canvas-pin canvas {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .canvas-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 32px 24px 40px;
      background: linear-gradient(transparent, rgba(11,32,33,0.85));
      pointer-events: none;
      z-index: 2;
    }

    .canvas-overlay .progress-bar {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.18);
      border-radius: 2px;
      overflow: hidden;
    }

    .canvas-overlay .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--green);
      border-radius: 2px;
    }

    .canvas-overlay .label {
      margin-top: 16px;
      font-family: 'Lato', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(233,231,227,0.7);
    }

    .loading-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(233,231,227,0.9);
      font-family: 'Lato', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      z-index: 3;
      pointer-events: none;
    }

    /* ── Birthday banner ───────────── */
    .birthday-banner {
      position: absolute;
      top: 48px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Cambo', Georgia, serif;
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      color: #FFFFFF;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
      z-index: 4;
      pointer-events: none;
      text-align: center;
      white-space: nowrap;
    }

    /* ── Scroll indicator ──────────── */
    .scroll-indicator {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      z-index: 4;
      pointer-events: none;
    }

    .scroll-indicator span {
      font-family: 'Lato', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.8);
      text-shadow: 0 1px 6px rgba(0,0,0,0.5);
    }

    .scroll-indicator .chevron {
      width: 18px;
      height: 18px;
      border-right: 2px solid rgba(255,255,255,0.8);
      border-bottom: 2px solid rgba(255,255,255,0.8);
      transform: rotate(45deg);
      animation: bounce 1.8s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: rotate(45deg) translateY(0); }
      50% { transform: rotate(45deg) translateY(6px); }
    }

    /* ── Prefers reduced motion ────── */
    @media (prefers-reduced-motion: reduce) {
      .canvas-section { height: auto; }
      .canvas-pin { position: relative; height: auto; }
      .scroll-indicator .chevron { animation: none; }
    }

    /* ── Mobile ────────────────────── */
    @media (max-width: 700px) {
      .canvas-overlay { padding: 24px 20px 32px; }
    }
  </style>
</head>
<body>

  <section class="canvas-section" id="canvasSection">
    <div class="canvas-pin">
      <canvas id="frameCanvas"></canvas>
      <div class="birthday-banner" id="birthdayBanner">Noah's Birthday</div>
      <div class="loading-indicator" id="loadingIndicator">Loading...</div>
      <div class="scroll-indicator" id="scrollIndicator">
        <span>Scroll</span>
        <div class="chevron"></div>
      </div>
      <div class="canvas-overlay">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="label">Scroll position &bull; video frame</div>
      </div>
    </div>
  </section>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    const TOTAL_FRAMES = 240;
    const canvas = document.getElementById('frameCanvas');
    const ctx = canvas.getContext('2d');
    const progressFill = document.getElementById('progressFill');
    const loadingEl = document.getElementById('loadingIndicator');
    const birthdayBanner = document.getElementById('birthdayBanner');
    const scrollIndicator = document.getElementById('scrollIndicator');
    const frames = new Array(TOTAL_FRAMES);
    let loadedCount = 0;
    let currentFrame = 0;
    let allLoaded = false;

    // ── Detect device: <768px → mobile portrait frames, otherwise landscape ──
    const isMobile = window.innerWidth < 768;
    const framesDir = isMobile ? 'frames-mobile/' : 'frames/';

    // ── Resize canvas to fill the pin container ──
    function resize() {
      const pin = canvas.parentElement;
      const w = pin.clientWidth;
      const h = pin.clientHeight;
      const dpr = window.devicePixelRatio || 1;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(dpr, dpr);
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
    }

    window.addEventListener('resize', () => {
      resize();
      drawFrame(currentFrame);
    });

    resize();

    // ── Draw frame, falling back to nearest loaded frame ──
    function drawFrame(index) {
      // Find nearest loaded frame if exact frame isn't ready
      let frame = frames[index];
      let useIndex = index;
      if (!frame) {
        for (let d = 1; d < TOTAL_FRAMES; d++) {
          if (index - d >= 0 && frames[index - d]) {
            frame = frames[index - d];
            useIndex = index - d;
            break;
          }
          if (index + d < TOTAL_FRAMES && frames[index + d]) {
            frame = frames[index + d];
            useIndex = index + d;
            break;
          }
        }
        if (!frame) return;
      }
      currentFrame = index;

      const img = frame;
      const dpr = window.devicePixelRatio || 1;
      const cw = canvas.width / dpr;
      const ch = canvas.height / dpr;
      const imgAspect = img.naturalWidth / img.naturalHeight;
      const canvasAspect = cw / ch;

      let sx, sy, sw, sh;

      if (imgAspect > canvasAspect) {
        // Image wider — crop sides
        sh = img.naturalHeight;
        sw = sh * canvasAspect;
        sx = (img.naturalWidth - sw) / 2;
        sy = 0;
      } else {
        // Image taller — crop top/bottom
        sw = img.naturalWidth;
        sh = sw / canvasAspect;
        sx = 0;
        sy = (img.naturalHeight - sh) / 2;
      }

      ctx.clearRect(0, 0, cw, ch);
      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, cw, ch);
    }

    // ── Progressive preload: every 3rd frame first, then fill in ──
    function pad(n) { return String(n).padStart(3, '0'); }

    let scrollTriggerReady = false;

    function preloadFrame(i) {
      const img = new Image();
      img.onload = () => {
        frames[i] = img;
        loadedCount++;
        loadingEl.textContent = 'Loading... ' + Math.round(loadedCount / TOTAL_FRAMES * 100) + '%';

        if (loadedCount === 1) {
          drawFrame(0);
          resize();
        }

        if (!scrollTriggerReady && loadedCount >= Math.ceil(TOTAL_FRAMES / 3)) {
          scrollTriggerReady = true;
          initScrollTrigger();
        }

        if (loadedCount === TOTAL_FRAMES) {
          allLoaded = true;
          loadingEl.style.display = 'none';
        }
      };
      img.onerror = () => {
        setTimeout(() => {
          const retry = new Image();
          retry.src = img.src;
          retry.onload = img.onload;
          retry.onerror = () => { loadedCount++; };
        }, 1000);
      };
      img.src = framesDir + 'frame_' + pad(i) + '.jpg';
    }

    // Load in staggered passes: every 3rd frame, then fill gaps
    const pass1 = [];
    const pass2 = [];
    for (let i = 0; i < TOTAL_FRAMES; i++) {
      if (i % 3 === 0) {
        pass1.push(i);
      } else {
        pass2.push(i);
      }
    }
    pass1.forEach(preloadFrame);
    setTimeout(() => { pass2.forEach(preloadFrame); }, 50);

    // ── ScrollTrigger — activates after first pass (every 3rd frame) ──
    function initScrollTrigger() {
      ScrollTrigger.create({
        trigger: '#canvasSection',
        start: 'top top',
        end: 'bottom bottom',
        scrub: 0.5,
        pin: true,
        onUpdate: (self) => {
          const frameIndex = Math.round(self.progress * (TOTAL_FRAMES - 1));
          if (frames[frameIndex]) {
            drawFrame(frameIndex);
          }
          progressFill.style.width = (self.progress * 100) + '%';

          // Banner fades out over first 12% of scroll
          birthdayBanner.style.opacity = Math.max(0, 1 - self.progress / 0.12);
          // Scroll indicator fades out over first 18% of scroll
          scrollIndicator.style.opacity = Math.max(0, 1 - self.progress / 0.18);
        }
      });
    }
  </script>

</body>
</html>
