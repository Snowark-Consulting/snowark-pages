<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noah's Birthday</title>
  <link href="https://fonts.googleapis.com/css2?family=Cambo&family=Lato:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <style>
    :root { --green: #0d8f64; --ink: #0b2021; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: auto; }

    body {
      font-family: 'Lato', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 16px;
      background: var(--ink);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    .video-section {
      position: relative;
      height: 400vh;
    }

    .video-pin {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: var(--ink);
    }

    .video-pin canvas {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .loading-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(233,231,227,0.9);
      font-family: 'Lato', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      z-index: 3;
      pointer-events: none;
    }

    .birthday-banner {
      position: absolute;
      top: 48px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Cambo', Georgia, serif;
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      color: #FFFFFF;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
      z-index: 4;
      pointer-events: none;
      text-align: center;
      white-space: nowrap;
    }

    .scroll-indicator {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      z-index: 4;
      pointer-events: none;
    }

    .scroll-indicator span {
      font-family: 'Lato', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.8);
      text-shadow: 0 1px 6px rgba(0,0,0,0.5);
    }

    .scroll-indicator .chevron {
      width: 18px;
      height: 18px;
      border-right: 2px solid rgba(255,255,255,0.8);
      border-bottom: 2px solid rgba(255,255,255,0.8);
      transform: rotate(45deg);
      animation: bounce 1.8s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: rotate(45deg) translateY(0); }
      50% { transform: rotate(45deg) translateY(6px); }
    }

    .video-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 32px 24px 40px;
      background: linear-gradient(transparent, rgba(11,32,33,0.85));
      pointer-events: none;
      z-index: 2;
    }

    .video-overlay .progress-bar {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.18);
      border-radius: 2px;
      overflow: hidden;
    }

    .video-overlay .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--green);
      border-radius: 2px;
    }

    .video-overlay .label {
      margin-top: 16px;
      font-family: 'Lato', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(233,231,227,0.7);
    }

    @media (prefers-reduced-motion: reduce) {
      .video-section { height: auto; }
      .video-pin { position: relative; height: auto; }
      .scroll-indicator .chevron { animation: none; }
    }

    @media (max-width: 700px) {
      .video-overlay { padding: 24px 20px 32px; }
    }
  </style>
</head>
<body>

  <section class="video-section" id="videoSection">
    <div class="video-pin">
      <canvas id="frameCanvas"></canvas>
      <div class="birthday-banner" id="birthdayBanner">Noah's Birthday</div>
      <div class="loading-indicator" id="loadingIndicator">Loading...</div>
      <div class="scroll-indicator" id="scrollIndicator">
        <span>Scroll</span>
        <div class="chevron"></div>
      </div>
      <div class="video-overlay">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="label">Scroll position &bull; video frame</div>
      </div>
    </div>
  </section>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    const TOTAL_FRAMES = 240;
    const canvas = document.getElementById('frameCanvas');
    const ctx = canvas.getContext('2d');
    const progressFill = document.getElementById('progressFill');
    const loadingEl = document.getElementById('loadingIndicator');
    const birthdayBanner = document.getElementById('birthdayBanner');
    const scrollIndicator = document.getElementById('scrollIndicator');

    const isMobile = window.innerWidth < 768;
    const framesDir = isMobile ? 'frames-mobile/' : 'frames/';
    const frames = new Array(TOTAL_FRAMES);
    let loadedCount = 0;
    let currentFrame = 0;
    let scrollTriggerReady = false;

    function resize() {
      const pin = canvas.parentElement;
      const dpr = window.devicePixelRatio || 1;
      canvas.width = pin.clientWidth * dpr;
      canvas.height = pin.clientHeight * dpr;
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(dpr, dpr);
    }

    function drawFrame(index) {
      let frame = frames[index];
      if (!frame) {
        for (let d = 1; d < TOTAL_FRAMES; d++) {
          if (index - d >= 0 && frames[index - d]) { frame = frames[index - d]; break; }
          if (index + d < TOTAL_FRAMES && frames[index + d]) { frame = frames[index + d]; break; }
        }
        if (!frame) return;
      }
      currentFrame = index;

      const dpr = window.devicePixelRatio || 1;
      const cw = canvas.width / dpr;
      const ch = canvas.height / dpr;
      const vw = frame.naturalWidth;
      const vh = frame.naturalHeight;
      if (!vw || !vh) return;

      const imgAspect = vw / vh;
      const canvasAspect = cw / ch;
      let sx, sy, sw, sh;

      if (imgAspect > canvasAspect) {
        sh = vh; sw = sh * canvasAspect;
        sx = (vw - sw) / 2; sy = 0;
      } else {
        sw = vw; sh = sw / canvasAspect;
        sx = 0; sy = (vh - sh) / 2;
      }

      ctx.clearRect(0, 0, cw, ch);
      ctx.drawImage(frame, sx, sy, sw, sh, 0, 0, cw, ch);
    }

    function pad(n) { return String(n).padStart(3, '0'); }

    function preloadFrame(i) {
      const img = new Image();
      img.onload = () => {
        frames[i] = img;
        loadedCount++;
        loadingEl.textContent = 'Loading... ' + Math.round(loadedCount / TOTAL_FRAMES * 100) + '%';
        if (loadedCount === 1) { resize(); drawFrame(0); }
        if (!scrollTriggerReady && loadedCount >= Math.ceil(TOTAL_FRAMES / 4)) {
          scrollTriggerReady = true;
          ScrollTrigger.create({
            trigger: '#videoSection',
            start: 'top top', end: 'max',
            scrub: 0.5, pin: true,
            onUpdate: (self) => {
              const fi = Math.round(self.progress * (TOTAL_FRAMES - 1));
              drawFrame(fi);
              progressFill.style.width = (self.progress * 100) + '%';
              birthdayBanner.style.opacity = Math.max(0, 1 - self.progress / 0.12);
              scrollIndicator.style.opacity = Math.max(0, 1 - self.progress / 0.18);
            },
            onLeave: () => drawFrame(TOTAL_FRAMES - 1)
          });
        }
        if (loadedCount === TOTAL_FRAMES) loadingEl.style.display = 'none';
      };
      img.onerror = () => {
        setTimeout(() => {
          const r = new Image();
          r.src = img.src;
          r.onload = img.onload;
          r.onerror = () => { loadedCount++; };
        }, 1000);
      };
      img.src = framesDir + 'frame_' + pad(i) + '.webp';
    }

    // Staggered: every 4th frame first, then fill
    const p1 = [], p2 = [];
    for (let i = 0; i < TOTAL_FRAMES; i++) {
      (i % 4 === 0 ? p1 : p2).push(i);
    }
    p1.forEach(preloadFrame);
    setTimeout(() => p2.forEach(preloadFrame), 50);

    window.addEventListener('resize', () => { resize(); drawFrame(currentFrame); });
  </script>

</body>
</html>
