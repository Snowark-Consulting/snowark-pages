<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noah's Birthday</title>
  <link href="https://fonts.googleapis.com/css2?family=Cambo&family=Lato:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: auto; }
    body {
      font-family: 'Lato', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0b2021;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    .video-section {
      position: relative;
      height: 400vh;
    }
    .video-pin {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #0b2021;
    }
    .video-pin canvas {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .scroll-indicator {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      z-index: 10;
      pointer-events: none;
    }
    .scroll-indicator span {
      font-family: 'Lato', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
      text-shadow: 0 1px 6px rgba(0,0,0,0.5);
    }
    .scroll-indicator .chevron {
      width: 18px;
      height: 18px;
      border-right: 2px solid rgba(255,255,255,0.85);
      border-bottom: 2px solid rgba(255,255,255,0.85);
      transform: rotate(45deg);
      animation: bounce 1.8s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: rotate(45deg) translateY(0); }
      50% { transform: rotate(45deg) translateY(6px); }
    }
    @media (prefers-reduced-motion: reduce) {
      .video-section { height: auto; }
      .video-pin { position: relative; height: auto; }
      .scroll-indicator .chevron { animation: none; }
    }
  </style>
</head>
<body>

  <section class="video-section" id="videoSection">
    <div class="video-pin" id="videoPin">
      <canvas id="frameCanvas"></canvas>
      <div class="scroll-indicator" id="scrollIndicator">
        <span>Scroll</span>
        <div class="chevron"></div>
      </div>
    </div>
  </section>

  <script>
    (function() {
      // Guard: wait for GSAP
      if (typeof gsap === 'undefined' || typeof ScrollTrigger === 'undefined') {
        setTimeout(arguments.callee, 100);
        return;
      }

      gsap.registerPlugin(ScrollTrigger);

      var TOTAL_FRAMES = 192;
      var canvas = document.getElementById('frameCanvas');
      var ctx = canvas.getContext('2d');
      var scrollIndicator = document.getElementById('scrollIndicator');
      var pin = document.getElementById('videoPin');

      var frames = new Array(TOTAL_FRAMES);
      var loadedCount = 0;
      var currentFrame = 0;
      var st = null;

      function pad(n) { return String(n).padStart(3, '0'); }

      function resize() {
        var dpr = window.devicePixelRatio || 1;
        var cw = pin.clientWidth;
        var ch = pin.clientHeight;
        canvas.width = cw * dpr;
        canvas.height = ch * dpr;
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(dpr, dpr);
        return { cw: cw, ch: ch };
      }

      function drawFrame(index) {
        var frame = frames[index];
        if (!frame) {
          for (var d = 1; d < TOTAL_FRAMES; d++) {
            if (index - d >= 0 && frames[index - d]) { frame = frames[index - d]; break; }
            if (index + d < TOTAL_FRAMES && frames[index + d]) { frame = frames[index + d]; break; }
          }
          if (!frame) return;
        }
        currentFrame = index;

        var dpr = window.devicePixelRatio || 1;
        var cw = canvas.width / dpr;
        var ch = canvas.height / dpr;
        var vw = frame.naturalWidth;
        var vh = frame.naturalHeight;
        if (!vw || !vh) return;

        var imgAspect = vw / vh;
        var canvasAspect = cw / ch;
        var sx, sy, sw, sh;

        if (imgAspect > canvasAspect) {
          sh = vh;
          sw = sh * canvasAspect;
          sx = (vw - sw) / 2;
          sy = 0;
        } else {
          sw = vw;
          sh = sw / canvasAspect;
          sx = 0;
          sy = (vh - sh) / 2;
        }

        ctx.clearRect(0, 0, cw, ch);
        ctx.drawImage(frame, sx, sy, sw, sh, 0, 0, cw, ch);
      }

      function onFrameLoaded(i, img) {
        frames[i] = img;
        loadedCount++;

        if (loadedCount === 1) {
          resize();
          drawFrame(0);
        }

        if (!st && loadedCount >= Math.ceil(TOTAL_FRAMES / 4)) {
          st = ScrollTrigger.create({
            trigger: '#videoSection',
            start: 'top top',
            end: 'max',
            scrub: 0.5,
            pin: true,
            onUpdate: function(self) {
              var fi = Math.round(self.progress * (TOTAL_FRAMES - 1));
              drawFrame(fi);
              scrollIndicator.style.opacity = Math.max(0, 1 - self.progress / 0.10);
            },
            onLeave: function() {
              drawFrame(TOTAL_FRAMES - 1);
            }
          });
        }
      }

      function preloadFrame(i) {
        var img = new Image();
        img.onload = function() { onFrameLoaded(i, img); };
        img.onerror = function() {
          setTimeout(function() {
            var r = new Image();
            r.src = img.src;
            r.onload = function() { onFrameLoaded(i, r); };
            r.onerror = function() { loadedCount++; };
          }, 1000);
        };
        img.src = 'frames/frame_' + pad(i) + '.webp';
      }

      // Init: size canvas
      resize();

      // Preload: every 4th frame first, then fill
      var p1 = [], p2 = [];
      for (var i = 0; i < TOTAL_FRAMES; i++) {
        (i % 4 === 0 ? p1 : p2).push(i);
      }
      p1.forEach(preloadFrame);
      setTimeout(function() { p2.forEach(preloadFrame); }, 50);

      window.addEventListener('resize', function() {
        resize();
        drawFrame(currentFrame);
      });
    })();
  </script>

</body>
</html>
